/* ===== GitHub Pages / スマホ対応：地図JSは変更しない安全版 ===== */
@media (max-width: 768px){
  html,body,#map{

    padding:0 6px !important;
    font-size:12px !important;

  }

  .toggle-group{

    grid-template-columns:1fr 1fr !important;
    gap:6px !important;
    width:100% !important;
    margin-left:0 !important;

/* ===== スマホ用：小型アイコン操作 ===== */
.mobile-iconbar{
  position:absolute;
  z-index:1300;
  top:10px;
  right:10px;
  display:flex;
  flex-direction:column;
  gap:7px;
}
.icon-btn{
  width:42px;
  height:42px;
  border:0;
  border-radius:12px;
  background:rgba(15,23,42,.88);
  color:#fff;
  font-size:20px;
  font-weight:900;
  line-height:1;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 3px 10px rgba(0,0,0,.28);
  cursor:pointer;
  padding:0;
}
.icon-btn.legend-icon{
  background:rgba(15,118,110,.92);
  font-size:15px;
}
.icon-btn.reset-icon{
  background:rgba(220,38,38,.94);
  font-size:24px;
}
.panel.hidden-mobile,
.legend.hidden-mobile{
  display:none !important;
}
@media (min-width:769px){
  .mobile-iconbar{display:none;}
}
@media (max-width:768px){
  .mobile-iconbar{display:flex !important;}
}

/* ===== 住所検索ピン・半径円 ===== */
.search-address-marker{
  width:28px;
  height:28px;
  border-radius:50% 50% 50% 0;
  background:#ef4444;
  border:3px solid #fff;
  transform:rotate(-45deg);
  box-shadow:0 2px 9px rgba(0,0,0,.45);
}
.search-address-marker::after{
  content:"";
  display:block;
  width:10px;
  height:10px;
  border-radius:50%;
  background:#fff;
  margin:6px;
}
.search-radius-label{
  font-size:12px;
  font-weight:900;
  color:#111827;
  background:rgba(255,255,255,.92);
  border:1px solid #94a3b8;
  border-radius:999px;
  padding:2px 7px;
  white-space:nowrap;
  box-shadow:0 1px 5px rgba(0,0,0,.22);
}


/* ===== 最小修正：サイズは変えず、スマホ時だけUI位置固定 ===== */
@media (max-width:768px){

  }
  .legend{
    position:fixed !important;
    transform:none !important;
    zoom:1 !important;
  }
  .mobile-iconbar{
    position:fixed !important;
    transform:none !important;
    zoom:1 !important;
  }
}


/* ===== スマホ入力時の自動拡大防止 ===== */
@media (max-width:768px){

}


/* ===== 表示範囲のみアイコン ===== */

    m.bindTooltip(s.name,{permanent:true,direction:'right',className:'station-label',offset:[8,0]});
    stationLayer.addLayer(m); shown++;
  });
}
map.on('zoomend moveend',()=>{updateLabels();updateStationLabels();});

document.addEventListener('DOMContentLoaded',()=>{

  if(q){q.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();applyFilter();}});}

function applyFilter(){

  const pref=document.getElementById('pref').value; const op=document.getElementById('opclass').value;

    const stationName=stripStationSuffix(d.station);
    return fields.some(v=>v.includes(q)) || (qStation&&stationName.includes(qStation));
  });
  render(activeData);
  if(q){
    const st=STATIONS.find(s=>stripStationSuffix(s.name)===qStation)||STATIONS.find(s=>stripStationSuffix(s.name).includes(qStation));
    if(st){lastSearchStation=st; map.setView([st.lat,st.lon],14); if(document.getElementById('stationToggle'))document.getElementById('stationToggle').checked=true; updateStationLabels();}
    else if(activeData.length===1){map.setView([activeData[0].lat,activeData[0].lon],15);}
    else if(activeData.length>1){const fg=L.featureGroup(activeData.map(d=>L.marker([d.lat,d.lon]))); map.fitBounds(fg.getBounds().pad(0.15));}

}

function initSelects(){const prefs=[...new Set(DATA.map(d=>d.pref).filter(Boolean))].sort();const pref=document.getElementById('pref');prefs.forEach(v=>pref.insertAdjacentHTML('beforeend',`<option value="${v}">${v}</option>`));const op=document.getElementById('opclass');['白内障','硝子体','緑内障','白内障＋硝子体','白内障＋緑内障','硝子体＋緑内障','白内障＋硝子体＋緑内障','オペ記載なし','未分類'].forEach(v=>op.insertAdjacentHTML('beforeend',`<option value="${v}">${v}</option>`));const leg=document.getElementById('legend');['白内障','硝子体','緑内障','白内障＋硝子体','白内障＋緑内障','硝子体＋緑内障','白内障＋硝子体＋緑内障','オペ記載なし','未分類'].forEach(v=>{const fg=v==='白内障＋緑内障'?'#111':'#fff';leg.insertAdjacentHTML('beforeend',`<div class="lrow"><span class="pin-sample" style="background:${COLORS[v]};color:${fg}">${TEXT[v]}</span><span>${v}</span></div>`);});}

<script>
(function(){
  let addressSearchMarker = null;
  let addressSearchRings = [];
  let addressSearchLabels = [];

  function isProbablyAddress(q){
    if(!q) return false;
    return /都|道|府|県|市|区|町|村|丁目|番地|番|号|〒|\d/.test(q);
  }

  function normalizeJapaneseAddress(q){
    return String(q || '')
      .trim()
      .replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0)-0xFEE0))
      .replace(/[－ー−―‐]/g, '-')
      .replace(/\s+/g, '')
      .replace(/丁目/g, '-')
      .replace(/番地/g, '-')
      .replace(/番/g, '-')
      .replace(/号/g, '')
      .replace(/--+/g, '-')
      .replace(/-$/g, '');
  }

  function makeAddressQueries(q){
    const raw = String(q || '').trim();
    const norm = normalizeJapaneseAddress(raw);
    const noPostal = norm.replace(/〒?\d{3}-?\d{4}/, '');
    const list = [];
    [raw, norm, noPostal].forEach(v=>{
      if(v && !list.includes(v)) list.push(v);
    });
    const parts = noPostal.split('-');
    for(let i=parts.length; i>=1; i--){
      const s = parts.slice(0,i).join('-');
      if(s && !list.includes(s)) list.push(s);
    }
    return list.filter(Boolean);
  }

  function formatJapaneseAddress(displayName, original){
    const src = String(displayName || original || '');
    if(src.includes(',')){
      const parts = src.split(',').map(s=>s.trim()).filter(Boolean);
      const postal = parts.find(p => /^\d{3}-?\d{4}$/.test(p));
      const jp = parts.filter(p => p !== '日本' && p !== 'Japan' && !/^\d{3}-?\d{4}$/.test(p));
      let out = jp.reverse().join('');
      if(postal) out += '（〒' + postal + '）';
      return out || String(original || '');
    }
    return src || String(original || '');
  }

  function clearAddressSearch(){
    if(typeof map === 'undefined') return;
    if(addressSearchMarker){
      try{ map.removeLayer(addressSearchMarker); }catch(e){}
      addressSearchMarker = null;
    }
    addressSearchRings.forEach(x=>{try{map.removeLayer(x)}catch(e){}});
    addressSearchLabels.forEach(x=>{try{map.removeLayer(x)}catch(e){}});
    addressSearchRings = [];
    addressSearchLabels = [];
  }

  function destinationPoint(lat, lon, distanceMeters, bearingDeg){
    const R = 6378137;
    const brng = bearingDeg * Math.PI / 180;
    const phi1 = lat * Math.PI / 180;
    const lambda1 = lon * Math.PI / 180;
    const d = distanceMeters / R;
    const phi2 = Math.asin(Math.sin(phi1)*Math.cos(d) + Math.cos(phi1)*Math.sin(d)*Math.cos(brng));
    const lambda2 = lambda1 + Math.atan2(Math.sin(brng)*Math.sin(d)*Math.cos(phi1), Math.cos(d)-Math.sin(phi1)*Math.sin(phi2));
    return [phi2*180/Math.PI, lambda2*180/Math.PI];
  }

  function addRadius(lat, lon){
    if(typeof L === 'undefined' || typeof map === 'undefined') return;
    const defs = [
      {m:500, label:'500m', color:'#2563eb', dash:'6 6'},
      {m:1000, label:'1km', color:'#111827', dash:null},
      {m:2000, label:'2km', color:'#111827', dash:null},
      {m:3000, label:'3km', color:'#111827', dash:null}
    ];
    defs.forEach(d=>{
      const circle = L.circle([lat,lon], {
        radius:d.m,
        color:d.color,
        weight:d.m===500 ? 3 : 2,
        dashArray:d.dash,
        fill:false,
        opacity:.85,
        interactive:false
      }).addTo(map);
      circle.__addressRadiusLayer = true;
      addressSearchRings.push(circle);

      const pos = destinationPoint(lat, lon, d.m, 90);
      const label = L.marker(pos, {
        interactive:false,
        icon:L.divIcon({
          className:'search-radius-label',
          html:d.label,
          iconSize:null
        })
      }).addTo(map);
      label.__addressRadiusLabel = true;
      addressSearchLabels.push(label);
    });
  }

  function addAddressMarker(lat, lon, label){
    if(typeof L === 'undefined' || typeof map === 'undefined') return;
    clearAddressSearch();

    const icon = L.divIcon({
      className:'',
      html:'<div class="search-address-marker"></div>',
      iconSize:[28,28],
      iconAnchor:[14,28]
    });

    addressSearchMarker = L.marker([lat, lon], {icon:icon}).addTo(map);
    addRadius(lat, lon);

    const input = document.getElementById('q')?.value || '';
    const cleanLabel = formatJapaneseAddress(label, input);
    addressSearchMarker.bindPopup('<b>住所検索地点</b><br>'+cleanLabel).openPopup();

    addressSearchMarker.on('click', function(){
      clearAddressSearch();
    });

    map.setView([lat, lon], 16);
  }

  async function geocodeGSI(q){
    const queries = makeAddressQueries(q);
    for(const query of queries){
      try{
        const url = 'https://msearch.gsi.go.jp/address-search/AddressSearch?q=' + encodeURIComponent(query);
        const res = await fetch(url, {headers:{'Accept':'application/json'}});
        if(!res.ok) continue;
        const arr = await res.json();
        if(arr && arr.length && arr[0].geometry && arr[0].geometry.coordinates){
          const lon = arr[0].geometry.coordinates[0];
          const lat = arr[0].geometry.coordinates[1];
          const title = arr[0].properties && arr[0].properties.title ? arr[0].properties.title : query;
          addAddressMarker(lat, lon, title);
          return true;
        }
      }catch(e){
        console.warn('GSI geocode failed:', query, e);
      }
    }
    return false;
  }

  async function geocodeNominatim(q){
    const queries = makeAddressQueries(q);
    for(const query of queries){
      try{
        const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=jp&accept-language=ja&q=' + encodeURIComponent(query + ' 日本');
        const res = await fetch(url, {headers:{'Accept':'application/json'}});
        if(!res.ok) continue;
        const arr = await res.json();
        if(arr && arr.length){
          const hit = arr[0];
          addAddressMarker(parseFloat(hit.lat), parseFloat(hit.lon), hit.display_name || query);
          return true;
        }
      }catch(e){
        console.warn('Nominatim geocode failed:', query, e);
      }
    }
    return false;
  }

  async function geocodeAddress(q){
    if(await geocodeGSI(q)) return true;
    if(await geocodeNominatim(q)) return true;
    return false;
  }

  const originalApplyFilter = window.applyFilter;
  window.applyFilter = async function(){
    const qEl = document.getElementById('q');
    const q = qEl ? qEl.value.trim() : '';

    if(typeof originalApplyFilter === 'function'){
      originalApplyFilter.apply(this, arguments);
    }

    if(isProbablyAddress(q)){
      const ok = await geocodeAddress(q);
      if(!ok){
        alert('住所検索に失敗しました。番地を少し省略して試してください。');
      }
    }
  };

  document.addEventListener('DOMContentLoaded', function(){
    const qEl = document.getElementById('q');
    if(qEl){
      qEl.addEventListener('keydown', function(e){
        if(e.key === 'Enter'){
          e.preventDefault();
          if(typeof window.applyFilter === 'function') window.applyFilter();
        }
      });
    }
  });
})();
</script>

<script>
(function(){
  let if(activeFacilityMarker){
      try{ activeFacilityMarker.__selectedOnce = false; }catch(e){}
    }
    activeFacilityMarker = null;
  let facilityRings = [];
  let facilityRingLabels = [];

  function isManagedRadiusLayer(layer){
    if(typeof L === 'undefined') return false;

    if(layer && layer.__facilityRadiusLayer) return true;
    if(layer && layer.__facilityRadiusLabel) return true;

    if(layer instanceof L.Circle){
      const r = Math.round(layer.getRadius ? layer.getRadius() : 0);
      if([500,1000,2000,3000].includes(r)) return true;
    }

    if(layer instanceof L.Marker && layer.getIcon){
      const icon = layer.getIcon();
      const cls = icon && icon.options ? String(icon.options.className || '') : '';
      const html = icon && icon.options ? String(icon.options.html || '') : '';
      if(cls.includes('radius') || cls.includes('search-radius-label')) return true;
      if(/500m|1km|2km|3km/.test(html)) return true;
    }

    return false;
  }

  function clearFacilitySelection(){
    if(typeof map === 'undefined') return;

    facilityRings.forEach(x=>{try{map.removeLayer(x)}catch(e){}});
    facilityRingLabels.forEach(x=>{try{map.removeLayer(x)}catch(e){}});
    facilityRings = [];
    facilityRingLabels = [];

    const removeTargets = [];
    map.eachLayer(function(layer){
      if(isManagedRadiusLayer(layer)){
        removeTargets.push(layer);
      }
    });
    removeTargets.forEach(layer=>{
      try{map.removeLayer(layer)}catch(e){}
    });

    try{ map.closePopup(); }catch(e){}
    activeFacilityMarker = null;
  }

  function destinationPoint2(lat, lon, distanceMeters, bearingDeg){
    const R = 6378137;
    const brng = bearingDeg * Math.PI / 180;
    const phi1 = lat * Math.PI / 180;
    const lambda1 = lon * Math.PI / 180;
    const d = distanceMeters / R;
    const phi2 = Math.asin(Math.sin(phi1)*Math.cos(d) + Math.cos(phi1)*Math.sin(d)*Math.cos(brng));
    const lambda2 = lambda1 + Math.atan2(Math.sin(brng)*Math.sin(d)*Math.cos(phi1), Math.cos(d)-Math.sin(phi1)*Math.sin(phi2));
    return [phi2*180/Math.PI, lambda2*180/Math.PI];
  }

  function drawFacilityRings(lat, lon){
    if(typeof L === 'undefined' || typeof map === 'undefined') return;

    const defs = [
      {m:500, label:'500m', color:'#2563eb', dash:'6 6'},
      {m:1000, label:'1km', color:'#111827', dash:null},
      {m:2000, label:'2km', color:'#111827', dash:null},
      {m:3000, label:'3km', color:'#111827', dash:null}
    ];

    defs.forEach(d=>{
      const circle = L.circle([lat,lon], {
        radius:d.m,
        color:d.color,
        weight:d.m===500 ? 3 : 2,
        dashArray:d.dash,
        fill:false,
        opacity:.75,
        interactive:false
      }).addTo(map);
      circle.__facilityRadiusLayer = true;
      facilityRings.push(circle);

      const pos = destinationPoint2(lat, lon, d.m, 90);
      const label = L.marker(pos, {
        interactive:false,
        icon:L.divIcon({
          className:'search-radius-label',
          html:d.label,
          iconSize:null
        })
      }).addTo(map);
      label.__facilityRadiusLabel = true;
      facilityRingLabels.push(label);
    });
  }

  function isAddressSearchMarker(marker){
    const el = marker && marker.getElement ? marker.getElement() : null;
    const inner = el ? String(el.innerHTML || '') : '';
    return inner.includes('search-address-marker');
  }

  function patchMarkerClick(marker){
    if(!marker || marker.__facilityTogglePatched) return;
    if(isAddressSearchMarker(marker)) return;

    marker.__facilityTogglePatched = true;

    marker.on('click', function(){
      const ll = marker.getLatLng ? marker.getLatLng() : null;
      if(!ll) return;

      if(activeFacilityMarker === marker){
        if(marker.__selectedOnce){
          clearFacilitySelection();
          marker.__selectedOnce = false;
          return;
        }
      }
      marker.__selectedOnce = true

      clearFacilitySelection();
      activeFacilityMarker = marker;

      setTimeout(function(){
        const targets = [];
        map.eachLayer(function(layer){
          if(isManagedRadiusLayer(layer)) targets.push(layer);
        });
        targets.forEach(layer=>{try{map.removeLayer(layer)}catch(e){}});
        drawFacilityRings(ll.lat, ll.lng);
        try{
          if(marker.openPopup){ marker.openPopup(); }
        }catch(e){}
      }, 80);
    });
  }

  function patchAllMarkers(){
    if(typeof map === 'undefined' || typeof L === 'undefined') return;
    map.eachLayer(function(layer){
      if(layer instanceof L.Marker){
        patchMarkerClick(layer);
      }
    });
  }

  document.addEventListener('DOMContentLoaded', function(){
    setTimeout(patchAllMarkers, 800);
    setTimeout(patchAllMarkers, 2000);
  });

  setInterval(patchAllMarkers, 2500);
})();
</script>
